name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  compile:
    name: Compile Dashboard
    runs-on: ubuntu-24.04-arm
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - name: Checkout dash
        uses: actions/checkout@v6
        with:
          ref: "main"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Get version
        id: get_version
        run: echo "version=$(grep '^version' dash/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')" >> $GITHUB_OUTPUT

      - name: Build dashboard
        run: |
          cd dash
          cargo build --release

      - name: Compress binary
        run: xz -c dash/target/release/dash > dash-arm64.xz

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: dash-binary
          path: dash-arm64.xz

  release-binary:
    name: Release Binary
    needs: [compile]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: "main"

      - uses: actions/download-artifact@v7
        with:
          name: dash-binary

      - name: Release dash binary
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ format('v{0}', needs.compile.outputs.version) }}
          name: ${{ format('v{0}', needs.compile.outputs.version) }}
          generate_release_notes: true
          files: |
            dash-arm64.xz

  build:
    name: Build RPi Image
    runs-on: ubuntu-latest
    needs: [compile]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v7
        with:
          name: dash-binary

      - name: Decompress binary
        run: xz -d dash-arm64.xz

      - name: Create custom stage
        run: |
          mkdir -p custom-stage/01-customization/files/usr/local/bin

          cp -r ./src/. custom-stage/01-customization/files/
          cp dash-arm64 custom-stage/01-customization/files/usr/local/bin/dash

          cat > custom-stage/01-customization/00-run.sh <<-'EOF'
          #!/bin/bash -e
          cp -rp files/* "${ROOTFS_DIR}/"
          EOF

          cat > custom-stage/01-customization/00-run-chroot.sh <<-'EOF'
          #!/bin/bash -e
          apt-get update
          apt-get install -y --no-install-recommends \
              xserver-xorg xinit x11-xserver-utils libxkbcommon-x11-0 openbox \
              xserver-xorg-input-evdev xserver-xorg-input-libinput

          chown root:root /usr/local/bin/dash
          chmod 755 /usr/local/bin/dash
          echo "root:root" | chpasswd

          mkdir -p /storage/music
          chown -R driver:driver /storage
          chown -R driver:driver /home/driver
          EOF

          cat > custom-stage/prerun.sh <<-'EOF'
          #!/bin/bash -e
          if [ ! -d "${ROOTFS_DIR}" ]; then
            copy_previous
          fi
          EOF

          chmod +x custom-stage/prerun.sh
          chmod +x custom-stage/01-customization/00-run.sh
          chmod +x custom-stage/01-customization/00-run-chroot.sh

      - uses: usimd/pi-gen-action@v1
        id: build
        with:
          apt-proxy: ""
          compression: xz
          compression-level: 6
          disable-first-boot-user-rename: 1
          docker-opts: ""
          enable-cloud-init: 0
          enable-noobs: false
          enable-ssh: 1
          export-last-stage-only: true
          extra-host-dependencies: ""
          extra-host-modules: ""
          github-token: ${{ github.token }}
          hostname: miata
          image-name: "miata-dash-${{ needs.compile.outputs.version }}-arm64"
          increase-runner-disk-size: true
          keyboard-keymap: us
          keyboard-layout: English (US)
          locale: en_US.UTF-8
          password: "driver"
          pi-gen-dir: pi-gen
          pi-gen-release: Raspberry Pi reference
          pi-gen-repository: RPi-Distro/pi-gen
          pi-gen-version: 2025-12-04-raspios-trixie-arm64
          pubkey-only-ssh: 0
          pubkey-ssh-first-user: ""
          release: trixie
          setfcap: ""
          stage-list: stage0 stage1 stage2 ./custom-stage
          temp-repo: ""
          timezone: Europe/Brussels
          username: driver
          verbose-output: false
          wpa-country: ""
          wpa-essid: ""
          wpa-password: ""

      - uses: actions/upload-artifact@v7
        with:
          name: miata-image
          path: ${{ steps.build.outputs.image-path }}

  release-image:
    name: Release RPi Image
    needs: [compile, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: "main"

      - uses: actions/download-artifact@v8
        with:
          name: miata-image

      - name: Release arm64 image
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ format('v{0}', needs.compile.outputs.version) }}
          name: ${{ format('v{0}', needs.compile.outputs.version) }}
          overwrite_files: true
          files: |
            image*.img.xz
